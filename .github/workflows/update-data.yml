name: 更新股票数据

on:
  # 每天北京时间 18:00 自动运行（UTC 10:00）
  # 仅工作日（周一到周五）
  schedule:
    - cron: '0 10 * * 1-5'
  # 手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run news fetcher
        run: python fetch_stock_news.py --top 30 --max-news 8

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_data.json
          if git diff --cached --quiet; then
            echo "No data changes, skip commit."
          else
            git commit -m "chore: update stock data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
